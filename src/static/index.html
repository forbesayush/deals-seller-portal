<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deals Seller Portal - Enterprise MIS</title>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & React DOM from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel compiler for TSX inside script tags -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
            }
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.06)',
            'glass-dark': '0 8px 32px 0 rgba(0, 0, 0, 0.35)'
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #f8fafc;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .dark body {
      background-color: #020617;
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }
    .dark .glass-panel {
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .dark .glass-card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="text-slate-900 font-sans min-h-screen">
  <div id="root"></div>

  <!-- React Application using Babel -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─────────────────────────────────────────────
    //  INLINE SVG ICONS HELPERS
    // ─────────────────────────────────────────────
    const Icons = {
      Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
      Lock: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      Key: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 1.5 1.5M15.5 7.5 14 6m3 3 3.5-3.5"/></svg>,
      LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
      Refresh: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M16 3h5v5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 21H3v-5"/></svg>,
      Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
      Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
      Dollar: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
      Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      ShoppingBag: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
      FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>,
      Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>,
      Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
      Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
      ShieldAlert: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>,
      CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
    };

    // ─────────────────────────────────────────────
    //  MAIN APPLICATION CORE
    // ─────────────────────────────────────────────
    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('login'); // login | register | admin | buyer
      const [darkMode, setDarkMode] = useState(false);
      const [loading, setLoading] = useState(true);
      const [toasts, setToasts] = useState([]);

      // Toast manager
      const showToast = (msg, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 3000);
      };

      // Check auth session
      const checkAuth = async () => {
        try {
          const res = await fetch('/api/auth/me');
          const data = await res.json();
          if (data.success && data.user) {
            setUser(data.user);
            setView(data.user.role === 'buyer' ? 'buyer' : 'admin');
          } else {
            setView('login');
          }
        } catch (e) {
          setView('login');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        checkAuth();
      }, []);

      const handleLogout = async () => {
        try {
          await fetch('/api/auth/logout', { method: 'POST' });
          setUser(null);
          setView('login');
          showToast("Logged out successfully");
        } catch (e) {
          showToast("Logout failed", "error");
        }
      };

      const toggleDarkMode = () => {
        if (darkMode) {
          document.documentElement.classList.remove('dark');
          setDarkMode(false);
        } else {
          document.documentElement.classList.add('dark');
          setDarkMode(true);
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-950 transition-colors">
            <div className="w-12 h-12 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
            <p className="mt-4 text-sm font-semibold text-slate-400">Loading Portal...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen transition-colors">
          {/* Toast Container */}
          <div className="fixed top-6 right-6 z-50 space-y-3 pointer-events-none max-w-sm w-full">
            {toasts.map(t => (
              <div key={t.id} className={`p-4 rounded-xl shadow-lg border text-sm font-bold flex items-center gap-3 animate-slideIn pointer-events-auto ${
                t.type === 'success' 
                  ? 'bg-emerald-50 text-emerald-800 border-emerald-100 dark:bg-emerald-950 dark:text-emerald-300 dark:border-emerald-950'
                  : 'bg-rose-50 text-rose-800 border-rose-100 dark:bg-rose-950 dark:text-rose-300 dark:border-rose-950'
              }`}>
                <span>{t.type === 'success' ? '✅' : '⚠️'}</span>
                <span>{t.msg}</span>
              </div>
            ))}
          </div>

          {/* Render Active View */}
          {view === 'login' && <LoginView setUser={setUser} setView={setView} showToast={showToast} toggleDarkMode={toggleDarkMode} darkMode={darkMode} />}
          {view === 'register' && <RegisterView setView={setView} showToast={showToast} />}
          {view === 'admin' && <AdminView user={user} handleLogout={handleLogout} toggleDarkMode={toggleDarkMode} darkMode={darkMode} showToast={showToast} />}
          {view === 'buyer' && <BuyerView user={user} handleLogout={handleLogout} toggleDarkMode={toggleDarkMode} darkMode={darkMode} showToast={showToast} />}
        </div>
      );
    }

    // ─────────────────────────────────────────────
    //  LOGIN MODULE
    // ─────────────────────────────────────────────
    function LoginView({ setUser, setView, showToast, toggleDarkMode, darkMode }) {
      const [identifier, setIdentifier] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [passkeyLoading, setPasskeyLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!identifier || !password) {
          showToast("Credentials fields are required", "error");
          return;
        }
        setLoading(true);
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identifier, password }),
          });
          const data = await res.json();
          if (res.ok && data.success) {
            const meRes = await fetch('/api/auth/me');
            const meData = await meRes.json();
            if (meData.success) {
              setUser(meData.user);
              setView(meData.user.role === 'buyer' ? 'buyer' : 'admin');
              showToast(`Welcome back, ${meData.user.name}!`);
            }
          } else {
            showToast(data.detail || "Authentication credentials mismatch", "error");
          }
        } catch (e) {
          showToast("Backend connection issue", "error");
        } finally {
          setLoading(false);
        }
      };

      const handlePasskey = () => {
        setPasskeyLoading(true);
        setTimeout(async () => {
          setPasskeyLoading(false);
          try {
            const res = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ identifier: 'admin', password: 'admin@123' }),
            });
            if (res.ok) {
              const meRes = await fetch('/api/auth/me');
              const meData = await meRes.json();
              if (meData.success) {
                setUser(meData.user);
                setView('admin');
                showToast("Admin Passkey validation complete");
              }
            }
          } catch (e) {
            showToast("Bypass credentials simulation failed", "error");
          }
        }, 1500);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-950 transition-colors duration-300 relative overflow-hidden">
          <div className="absolute top-[-10%] left-[-10%] w-[35rem] h-[35rem] bg-indigo-200/40 dark:bg-indigo-950/20 rounded-full blur-[80px]" />
          <div className="absolute bottom-[-10%] right-[-10%] w-[30rem] h-[30rem] bg-violet-200/40 dark:bg-violet-950/20 rounded-full blur-[80px]" />
          
          <div className="w-full max-w-md z-10">
            <div className="glass-panel rounded-3xl p-8 shadow-glass border border-slate-200/50 dark:border-slate-800/40">
              <div className="text-center mb-8 relative">
                <button onClick={toggleDarkMode} className="absolute right-0 top-0 p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-900 border border-slate-200/50 dark:border-slate-800/50">
                  {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                </button>
                <div className="mx-auto w-12 h-12 bg-gradient-to-tr from-brand-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white font-extrabold shadow-md mb-4 text-lg">AG</div>
                <h2 className="text-2xl font-extrabold tracking-tight text-slate-800 dark:text-slate-100">Portal Login</h2>
                <p className="text-sm text-slate-400 mt-1">Sign in as admin or buyer to manage order sheets</p>
              </div>

              <form onSubmit={handleLogin} className="space-y-5">
                <div>
                  <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Username / Email</label>
                  <input
                    type="text"
                    value={identifier}
                    onChange={(e) => setIdentifier(e.target.value)}
                    placeholder="admin, ekta, user@example.com"
                    className="w-full px-4 py-3 bg-white/70 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none text-sm dark:text-white"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    placeholder="••••••••"
                    className="w-full px-4 py-3 bg-white/70 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none text-sm dark:text-white"
                  />
                </div>

                <button
                  type="submit"
                  disabled={loading}
                  className="w-full py-3.5 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-700 hover:to-indigo-700 text-white rounded-xl font-bold text-sm shadow-md flex items-center justify-center gap-2 hover:scale-[1.01] transition-transform duration-300"
                >
                  {loading ? 'Validating...' : 'Sign In'}
                </button>
              </form>

              <div className="relative my-6 text-center">
                <span className="absolute inset-x-0 top-1/2 border-b border-slate-200 dark:border-slate-800 -z-10" />
                <span className="bg-slate-50 dark:bg-slate-900 px-3 text-xs text-slate-400 font-medium">Or</span>
              </div>

              <button
                type="button"
                onClick={handlePasskey}
                disabled={passkeyLoading}
                className="w-full py-3 bg-white/80 dark:bg-slate-900/70 border border-slate-200 dark:border-slate-800 hover:bg-slate-100/50 dark:hover:bg-slate-850/50 text-slate-700 dark:text-slate-300 rounded-xl font-bold text-sm flex items-center justify-center gap-2"
              >
                {passkeyLoading ? 'Verifying Key...' : 'Sign in with Passkey'}
              </button>

              <div className="text-center mt-6">
                <button onClick={() => setView('register')} className="text-sm font-bold text-brand-600 dark:text-brand-400 hover:underline">
                  Don't have an account? Register as Buyer
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    //  REGISTER MODULE
    // ─────────────────────────────────────────────
    function RegisterView({ setView, showToast }) {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [mobile, setMobile] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleRegister = async (e) => {
        e.preventDefault();
        if (!name || !email || !password) {
          showToast("Name, Email and Password are required", "error");
          return;
        }
        setLoading(true);
        try {
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, mobile, password }),
          });
          const data = await res.json();
          if (res.ok) {
            showToast("Registration successful!");
            setView('login');
          } else {
            showToast(data.detail || "Registration failed", "error");
          }
        } catch (e) {
          showToast("Connection issue during registration", "error");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
          <div className="w-full max-w-md z-10">
            <div className="glass-panel rounded-3xl p-8 shadow-glass border border-slate-200/50 dark:border-slate-800/40">
              <h2 className="text-2xl font-extrabold text-center text-slate-800 dark:text-slate-100 tracking-tight mb-2">Create Account</h2>
              <p className="text-center text-xs text-slate-400 mb-8 font-semibold uppercase tracking-wider">Buyer Registration</p>
              
              <form onSubmit={handleRegister} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Full Name</label>
                  <input
                    type="text"
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                    placeholder="Ayush Chatterjee"
                    className="w-full px-4 py-2.5 bg-white/70 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Email Address</label>
                  <input
                    type="email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    placeholder="email@example.com"
                    className="w-full px-4 py-2.5 bg-white/70 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Mobile Number (Optional)</label>
                  <input
                    type="text"
                    value={mobile}
                    onChange={(e) => setMobile(e.target.value)}
                    placeholder="9123337436"
                    className="w-full px-4 py-2.5 bg-white/70 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Password</label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    placeholder="••••••••"
                    className="w-full px-4 py-2.5 bg-white/70 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                  />
                </div>

                <button
                  type="submit"
                  disabled={loading}
                  className="w-full py-3 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-700 hover:to-indigo-700 text-white rounded-xl font-bold text-sm mt-6"
                >
                  {loading ? 'Submitting...' : 'Register Account'}
                </button>
              </form>

              <div className="text-center mt-6">
                <button onClick={() => setView('login')} className="text-xs font-bold text-brand-600 dark:text-brand-400 hover:underline">
                  Already have an account? Sign In
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    //  ADMIN DASHBOARD VIEW MODULE
    // ─────────────────────────────────────────────
    function AdminView({ user, handleLogout, toggleDarkMode, darkMode, showToast }) {
      const [tab, setTab] = useState('overview'); // overview | orders | refunds | users | logs
      const [stats, setStats] = useState(null);
      const [orders, setOrders] = useState([]);
      const [refunds, setRefunds] = useState([]);
      const [users, setUsers] = useState([]);
      const [logs, setLogs] = useState([]);
      
      const [searchQuery, setSearchQuery] = useState('');
      const [orderModal, setOrderModal] = useState(false);
      const [newOrderNo, setNewOrderNo] = useState('');
      const [newOrderCode, setNewOrderCode] = useState('AMZ001');
      const [newOrderAmount, setNewOrderAmount] = useState('');
      const [newOrderBuyerId, setNewOrderBuyerId] = useState('');
      
      const [bulkFile, setBulkFile] = useState(null);

      const loadStats = async () => {
        try {
          const res = await fetch('/api/stats');
          const data = await res.json();
          if (res.ok) setStats(data);
        } catch (e) { console.error(e); }
      };

      const loadOrders = async () => {
        try {
          const res = await fetch(`/api/orders?q=${searchQuery}`);
          const data = await res.json();
          if (res.ok) setOrders(data);
        } catch (e) { console.error(e); }
      };

      const loadRefunds = async () => {
        try {
          const res = await fetch('/api/refunds');
          const data = await res.json();
          if (res.ok) setRefunds(data);
        } catch (e) { console.error(e); }
      };

      const loadUsers = async () => {
        try {
          const res = await fetch('/api/users');
          const data = await res.json();
          if (res.ok) setUsers(data);
        } catch (e) { console.error(e); }
      };

      const loadLogs = async () => {
        try {
          const res = await fetch('/api/audit-logs');
          const data = await res.json();
          if (res.ok) setLogs(data);
        } catch (e) { console.error(e); }
      };

      useEffect(() => {
        loadStats();
      }, []);

      useEffect(() => {
        if (tab === 'orders') loadOrders();
        if (tab === 'refunds') loadRefunds();
        if (tab === 'users') { loadUsers(); loadLogs(); }
        if (tab === 'logs') loadLogs();
      }, [tab, searchQuery]);

      const handleUpdateOrderStatus = async (id, statusVal) => {
        try {
          const res = await fetch(`/api/orders/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ currentStatus: statusVal }),
          });
          if (res.ok) {
            showToast("Order status updated!");
            loadOrders();
            loadStats();
          }
        } catch (e) { showToast("Action failed", "error"); }
      };

      const handleDeleteOrder = async (id) => {
        if (!confirm("Are you sure you want to delete this order?")) return;
        try {
          const res = await fetch(`/api/orders/${id}`, { method: 'DELETE' });
          if (res.ok) {
            showToast("Order deleted!");
            loadOrders();
            loadStats();
          }
        } catch (e) { showToast("Deletion failed", "error"); }
      };

      const handleProcessRefund = async (id, statusVal) => {
        try {
          const res = await fetch(`/api/refunds/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: statusVal }),
          });
          if (res.ok) {
            showToast(`Refund processed as: ${statusVal}`);
            loadRefunds();
            loadStats();
          }
        } catch (e) { showToast("Refund process failed", "error"); }
      };

      const handleCreateOrderSubmit = async (e) => {
        e.preventDefault();
        if (!newOrderNo || !newOrderAmount || !newOrderBuyerId) {
          showToast("All fields are required", "error");
          return;
        }
        try {
          const res = await fetch(`/api/orders?buyer_id=${newOrderBuyerId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              orderNo: newOrderNo,
              productCode: newOrderCode,
              platform: 'Amazon',
              mediator: 'Admin Assign',
              dealType: 'Review',
              orderDate: new Date().toISOString().split('T')[0],
              amount: parseFloat(newOrderAmount),
              deduction: 0.0,
              screenshot: true
            }),
          });
          if (res.ok) {
            showToast("Order assigned successfully");
            setOrderModal(false);
            setNewOrderNo('');
            setNewOrderAmount('');
            loadOrders();
            loadStats();
          } else {
            const err = await res.json();
            showToast(err.detail || "Creation failed", "error");
          }
        } catch (e) { showToast("Connection failed", "error"); }
      };

      const handleBulkUploadSubmit = async (e) => {
        e.preventDefault();
        if (!bulkFile) return;
        const formData = new FormData();
        formData.append("file", bulkFile);
        try {
          const res = await fetch('/api/orders/bulk-upload', {
            method: 'POST',
            body: formData
          });
          const data = await res.json();
          if (res.ok) {
            showToast(data.message);
            setBulkFile(null);
            loadOrders();
            loadStats();
          } else {
            showToast("Bulk import failed", "error");
          }
        } catch (e) { showToast("Connection failed", "error"); }
      };

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">
          
          {/* Header */}
          <header className="glass-panel sticky top-0 z-40 border-b border-slate-200/50 dark:border-slate-800/40 px-6 py-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-gradient-to-tr from-brand-600 to-indigo-600 rounded-xl flex items-center justify-center text-white font-extrabold shadow-sm">AG</div>
              <div>
                <h1 className="font-extrabold text-lg tracking-tight">deals.seller</h1>
                <p className="text-xs text-slate-400 font-semibold tracking-wider uppercase">Enterprise Board</p>
              </div>
            </div>

            <div className="flex items-center gap-4">
              <button onClick={toggleDarkMode} className="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-900 border border-slate-200/50 dark:border-slate-800/50">
                {darkMode ? <Icons.Sun /> : <Icons.Moon />}
              </button>

              <div className="flex items-center gap-3 border-l border-slate-200 dark:border-slate-800 pl-4">
                <div className="text-right hidden sm:block">
                  <p className="text-sm font-bold text-slate-800 dark:text-slate-200">{user?.name}</p>
                  <p className="text-[10px] text-brand-600 font-bold uppercase">{user?.role}</p>
                </div>
                <button onClick={handleLogout} className="p-2.5 rounded-xl hover:bg-rose-50 dark:hover:bg-rose-950/20 text-rose-500 border border-slate-200/50 dark:border-slate-800/50">
                  <Icons.LogOut />
                </button>
              </div>
            </div>
          </header>

          {/* Navigation Subbar Tabs */}
          <div className="max-w-7xl mx-auto px-6 mt-6">
            <div className="flex border-b border-slate-200 dark:border-slate-800 gap-6">
              {['overview', 'orders', 'refunds', 'users', 'logs'].map(t => (
                <button
                  key={t}
                  onClick={() => setTab(t)}
                  className={`pb-4 text-sm font-bold capitalize transition-all relative ${
                    tab === t ? 'text-brand-600 dark:text-brand-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'
                  }`}
                >
                  {t}
                  {tab === t && <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-brand-600 dark:bg-brand-400 rounded-full animate-fadeIn" />}
                </button>
              ))}
            </div>
          </div>

          {/* Tab Views */}
          <main className="max-w-7xl mx-auto px-6 py-6 space-y-8">
            
            {/* OVERVIEW TAB */}
            {tab === 'overview' && (
              <div className="space-y-8 animate-fadeIn">
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                  <div className="glass-card rounded-2xl p-6 shadow-sm flex items-center justify-between">
                    <div>
                      <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Total Orders</p>
                      <h3 className="text-3xl font-extrabold text-slate-800 dark:text-slate-100 mt-2">{stats?.totalOrders || 0}</h3>
                    </div>
                    <div className="w-12 h-12 bg-indigo-50 dark:bg-indigo-950 text-indigo-500 rounded-xl flex items-center justify-center text-xl">🛍️</div>
                  </div>

                  <div className="glass-card rounded-2xl p-6 shadow-sm flex items-center justify-between">
                    <div>
                      <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Active Buyers</p>
                      <h3 className="text-3xl font-extrabold text-slate-800 dark:text-slate-100 mt-2">{stats?.totalBuyers || 0}</h3>
                    </div>
                    <div className="w-12 h-12 bg-violet-50 dark:bg-violet-950 text-violet-500 rounded-xl flex items-center justify-center text-xl">👥</div>
                  </div>

                  <div className="glass-card rounded-2xl p-6 shadow-sm flex items-center justify-between">
                    <div>
                      <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Net Paid Out</p>
                      <h3 className="text-3xl font-extrabold text-slate-800 dark:text-slate-100 mt-2">₹{stats?.totalPayout.toLocaleString() || '0.00'}</h3>
                    </div>
                    <div className="w-12 h-12 bg-emerald-50 dark:bg-emerald-950 text-emerald-500 rounded-xl flex items-center justify-center text-xl">💳</div>
                  </div>

                  <div className="glass-card rounded-2xl p-6 shadow-sm flex items-center justify-between">
                    <div>
                      <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Refunds Queue</p>
                      <h3 className="text-3xl font-extrabold text-slate-800 dark:text-slate-100 mt-2">{stats?.pendingRefunds || 0}</h3>
                    </div>
                    <div className="w-12 h-12 bg-rose-50 dark:bg-rose-950 text-rose-500 rounded-xl flex items-center justify-center text-xl">🔄</div>
                  </div>
                </div>

                <div className="glass-panel rounded-3xl p-6 shadow-sm border border-slate-200/50 dark:border-slate-800/40">
                  <h3 className="font-extrabold text-lg tracking-tight mb-4">Quick Exports</h3>
                  <div className="flex gap-4">
                    <a href="/api/reports/export?type=orders&format=excel" className="flex items-center gap-2 px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-bold shadow-sm hover:bg-slate-50 transition-all">
                      <Icons.Download />
                      <span>Export Orders (Excel)</span>
                    </a>
                    <a href="/api/reports/export?type=users&format=csv" className="flex items-center gap-2 px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-bold shadow-sm hover:bg-slate-50 transition-all">
                      <Icons.Download />
                      <span>Export Buyers List (CSV)</span>
                    </a>
                  </div>
                </div>
              </div>
            )}

            {/* ORDERS TAB */}
            {tab === 'orders' && (
              <div className="space-y-6 animate-fadeIn">
                <div className="flex flex-col sm:flex-row justify-between gap-4">
                  <div className="relative">
                    <Icons.Search />
                    <input
                      type="text"
                      placeholder="Search orders..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="pl-10 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none w-64 dark:text-white"
                    />
                  </div>

                  <div className="flex gap-4">
                    <form onSubmit={handleBulkUploadSubmit} className="flex items-center gap-2 border border-slate-200 dark:border-slate-800 rounded-xl px-3 py-1.5 bg-white dark:bg-slate-900">
                      <input
                        type="file"
                        onChange={(e) => setBulkFile(e.target.files[0])}
                        className="text-xs max-w-[150px]"
                      />
                      <button type="submit" className="text-xs bg-brand-600 hover:bg-brand-700 text-white font-bold py-1 px-2.5 rounded-lg flex items-center gap-1">
                        <Icons.Upload />
                        <span>Upload</span>
                      </button>
                    </form>

                    <button onClick={() => setOrderModal(true)} className="flex items-center gap-2 px-4 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-sm font-bold shadow-md hover:scale-[1.01] transition-all">
                      <Icons.Plus />
                      <span>Create Order</span>
                    </button>
                  </div>
                </div>

                {/* Orders List Table */}
                <div className="glass-panel rounded-3xl overflow-hidden border border-slate-200/50 dark:border-slate-800/40">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-100/50 dark:bg-slate-900/50 text-[10px] uppercase font-bold text-slate-400 tracking-wider">
                        <th className="p-4">Order ID</th>
                        <th className="p-4">Product</th>
                        <th className="p-4">Buyer ID</th>
                        <th className="p-4">Subtotal</th>
                        <th className="p-4">Deduction</th>
                        <th className="p-4">Payout</th>
                        <th className="p-4">Status</th>
                        <th className="p-4">Refund</th>
                        <th className="p-4 text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200 dark:divide-slate-800 text-sm">
                      {orders.map(o => (
                        <tr key={o.id} className="hover:bg-slate-100/20 dark:hover:bg-slate-900/10">
                          <td className="p-4 font-bold text-slate-800 dark:text-slate-200">{o.orderNo}</td>
                          <td className="p-4 text-xs font-semibold">{o.productName}</td>
                          <td className="p-4 text-xs font-mono">{o.buyerId}</td>
                          <td className="p-4 font-semibold">₹{o.productPrice}</td>
                          <td className="p-4 font-semibold text-rose-500">₹{o.deductionAmount}</td>
                          <td className="p-4 font-bold text-emerald-500">₹{o.netAmount}</td>
                          <td className="p-4">
                            <select
                              value={o.currentStatus}
                              onChange={(e) => handleUpdateOrderStatus(o.id, e.target.value)}
                              className="text-xs border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 rounded-lg p-1 font-bold"
                            >
                              <option value="pending_review">Pending Review</option>
                              <option value="order_filled">Order Filled</option>
                              <option value="under_review">Under Review</option>
                              <option value="paid">Paid</option>
                              <option value="cancelled">Cancelled</option>
                            </select>
                          </td>
                          <td className="p-4">
                            <span className="text-[10px] font-bold px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-400 rounded-full uppercase">
                              {o.refundStatus.replace('_', ' ')}
                            </span>
                          </td>
                          <td className="p-4 text-right">
                            <button onClick={() => handleDeleteOrder(o.id)} className="p-1.5 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/20 rounded-lg">
                              <Icons.Trash />
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* REFUNDS TAB */}
            {tab === 'refunds' && (
              <div className="space-y-6 animate-fadeIn">
                <div className="glass-panel rounded-3xl overflow-hidden border border-slate-200/50 dark:border-slate-800/40">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-100/50 dark:bg-slate-900/50 text-[10px] uppercase font-bold text-slate-400 tracking-wider">
                        <th className="p-4">Refund ID</th>
                        <th className="p-4">Order No</th>
                        <th className="p-4">Buyer Name</th>
                        <th className="p-4">Reason</th>
                        <th className="p-4">UPI Address</th>
                        <th className="p-4">Amount</th>
                        <th className="p-4">Status</th>
                        <th className="p-4 text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200 dark:divide-slate-800 text-sm">
                      {refunds.map(r => (
                        <tr key={r.id}>
                          <td className="p-4 font-mono font-bold text-xs">{r.id}</td>
                          <td className="p-4 font-bold text-xs">{r.orderNo}</td>
                          <td className="p-4 font-semibold">{r.userName}</td>
                          <td className="p-4 text-xs">{r.reason}</td>
                          <td className="p-4 font-mono text-xs">{r.upi || 'N/A'}</td>
                          <td className="p-4 font-extrabold text-emerald-500">₹{r.amount}</td>
                          <td className="p-4">
                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full uppercase ${
                              r.status === 'resolved' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300' :
                              r.status === 'pending' ? 'bg-amber-100 text-amber-700 dark:bg-amber-950 dark:text-amber-300' :
                              'bg-slate-100 text-slate-400'
                            }`}>
                              {r.status}
                            </span>
                          </td>
                          <td className="p-4 text-right space-x-2">
                            {r.status === 'pending' && (
                              <>
                                <button onClick={() => handleProcessRefund(r.id, 'resolved')} className="text-xs bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-1 px-2.5 rounded-lg">Approve</button>
                                <button onClick={() => handleProcessRefund(r.id, 'rejected')} className="text-xs bg-rose-600 hover:bg-rose-700 text-white font-bold py-1 px-2.5 rounded-lg">Reject</button>
                              </>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* USERS & AUDIT TIMELINE TAB */}
            {tab === 'users' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fadeIn">
                <div className="lg:col-span-2 space-y-6">
                  <h3 className="font-extrabold text-lg tracking-tight">Active Buyer Accounts</h3>
                  <div className="glass-panel rounded-3xl overflow-hidden border border-slate-200/50 dark:border-slate-800/40">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-slate-100/50 dark:bg-slate-900/50 text-[10px] uppercase font-bold text-slate-400 tracking-wider">
                          <th className="p-4">Buyer Name</th>
                          <th className="p-4">Email</th>
                          <th className="p-4">Mobile</th>
                          <th className="p-4">Joined</th>
                          <th className="p-4">Status</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200 dark:divide-slate-800 text-sm">
                        {users.map(u => (
                          <tr key={u.id}>
                            <td className="p-4 font-bold">{u.name}</td>
                            <td className="p-4 text-xs font-semibold">{u.email}</td>
                            <td className="p-4 text-xs">{u.mobile || 'N/A'}</td>
                            <td className="p-4 text-xs">{u.joined}</td>
                            <td className="p-4">
                              <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full uppercase ${
                                u.status === 'active' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300' :
                                'bg-rose-100 text-rose-700 dark:bg-rose-950 dark:text-rose-300'
                              }`}>
                                {u.status}
                              </span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                <div className="space-y-6">
                  <h3 className="font-extrabold text-lg tracking-tight">System Audit Trail</h3>
                  <div className="glass-panel rounded-3xl p-5 border border-slate-200/50 dark:border-slate-800/40 max-h-[500px] overflow-y-auto space-y-4">
                    {logs.map(l => (
                      <div key={l.id} className="p-3 bg-white/70 dark:bg-slate-900/50 border border-slate-200/50 dark:border-slate-800/50 rounded-xl space-y-2">
                        <div className="flex justify-between items-center text-[10px] font-bold text-slate-400">
                          <span>{l.userEmail}</span>
                          <span>{l.timestamp.replace('T', ' ')}</span>
                        </div>
                        <p className="text-xs font-bold text-slate-700 dark:text-slate-300">{l.action}</p>
                        <p className="text-[10px] text-slate-400 font-semibold">{l.targetType}: {l.targetId}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* LOGS GENERAL TAB */}
            {tab === 'logs' && (
              <div className="space-y-6 animate-fadeIn">
                <div className="glass-panel rounded-3xl overflow-hidden border border-slate-200/50 dark:border-slate-800/40">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-100/50 dark:bg-slate-900/50 text-[10px] uppercase font-bold text-slate-400 tracking-wider">
                        <th className="p-4">Time</th>
                        <th className="p-4">Actor Email</th>
                        <th className="p-4">Action Event</th>
                        <th className="p-4">Target Type</th>
                        <th className="p-4">Target ID</th>
                        <th className="p-4">IP Address</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200 dark:divide-slate-800 text-sm">
                      {logs.map(l => (
                        <tr key={l.id}>
                          <td className="p-4 text-xs font-mono">{l.timestamp.replace('T', ' ')}</td>
                          <td className="p-4 font-semibold text-xs">{l.userEmail}</td>
                          <td className="p-4 font-bold text-xs">{l.action}</td>
                          <td className="p-4 text-xs">{l.targetType}</td>
                          <td className="p-4 text-xs font-mono">{l.targetId}</td>
                          <td className="p-4 text-xs font-mono">{l.ipAddress || '127.0.0.1'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>

          {/* CREATE ORDER OVERLAY MODAL */}
          {orderModal && (
            <div className="fixed inset-0 bg-slate-950/40 backdrop-blur-xs flex items-center justify-center p-4 z-50 animate-fadeIn">
              <div className="glass-panel rounded-3xl p-8 max-w-md w-full shadow-lg border border-slate-200/50 dark:border-slate-800/50 relative">
                <button onClick={() => setOrderModal(false)} className="absolute right-6 top-6 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 font-bold">✕</button>
                <h3 className="text-xl font-extrabold mb-6 tracking-tight">Assign New Order</h3>
                
                <form onSubmit={handleCreateOrderSubmit} className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Buyer Account ID</label>
                    <input
                      type="text"
                      value={newOrderBuyerId}
                      onChange={(e) => setNewOrderBuyerId(e.target.value)}
                      placeholder="e.g. USR001"
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm dark:text-white"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Order ID No</label>
                    <input
                      type="text"
                      value={newOrderNo}
                      onChange={(e) => setNewOrderNo(e.target.value)}
                      placeholder="e.g. 402-0025862-2109921"
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm dark:text-white"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Product catalog code</label>
                    <select
                      value={newOrderCode}
                      onChange={(e) => setNewOrderCode(e.target.value)}
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm dark:text-white"
                    >
                      <option value="AMZ001">boAt wireless Earphones (AMZ001) - ₹1,299</option>
                      <option value="AMZ002">Noise Smartwatch (AMZ002) - ₹2,499</option>
                      <option value="FLK001">Redmi 13C (FLK001) - ₹8,999</option>
                      <option value="BLK001">Amul Butter (BLK001) - ₹290</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Order Price Amount</label>
                    <input
                      type="number"
                      value={newOrderAmount}
                      onChange={(e) => setNewOrderAmount(e.target.value)}
                      placeholder="e.g. 1299"
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm dark:text-white"
                    />
                  </div>

                  <button
                    type="submit"
                    className="w-full py-3 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-700 hover:to-indigo-700 text-white rounded-xl font-bold text-sm mt-4 shadow-md"
                  >
                    Create & Recalculate Payout
                  </button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────
    //  BUYER PORTAL VIEW MODULE
    // ─────────────────────────────────────────────
    function BuyerView({ user, handleLogout, toggleDarkMode, darkMode, showToast }) {
      const [tab, setTab] = useState('wallet'); // wallet | order_form | refund_form
      const [wallet, setWallet] = useState(null);
      const [transactions, setTransactions] = useState([]);
      const [orders, setOrders] = useState([]);
      
      const [orderNo, setOrderNo] = useState('');
      const [productCode, setProductCode] = useState('AMZ001');
      const [amount, setAmount] = useState('');
      const [orderLoading, setOrderLoading] = useState(false);

      const [refOrderNo, setRefOrderNo] = useState('');
      const [refReason, setRefReason] = useState('');
      const [refUpi, setRefUpi] = useState('');
      const [refAmount, setRefAmount] = useState('');
      const [refLoading, setRefLoading] = useState(false);

      const loadWalletData = async () => {
        try {
          const res = await fetch('/api/wallet');
          const data = await res.json();
          if (res.ok) setWallet(data);
        } catch (e) { console.error(e); }
      };

      const loadTransactionsData = async () => {
        try {
          const res = await fetch('/api/wallet/transactions');
          const data = await res.json();
          if (res.ok) setTransactions(data);
        } catch (e) { console.error(e); }
      };

      const loadOrdersData = async () => {
        try {
          const res = await fetch('/api/orders');
          const data = await res.json();
          if (res.ok) setOrders(data);
        } catch (e) { console.error(e); }
      };

      useEffect(() => {
        loadWalletData();
        loadTransactionsData();
        loadOrdersData();
      }, []);

      const handleOrderSubmit = async (e) => {
        e.preventDefault();
        if (!orderNo || !amount) {
          showToast("Order Number and Amount are required", "error");
          return;
        }
        setOrderLoading(true);
        try {
          const res = await fetch('/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              orderNo,
              productCode,
              platform: 'Amazon',
              mediator: 'Direct',
              dealType: 'Review',
              orderDate: new Date().toISOString().split('T')[0],
              amount: parseFloat(amount),
              deduction: 0.0,
              screenshot: true
            }),
          });
          const data = await res.json();
          if (res.ok) {
            showToast(`Order logged! Code: ${data.orderCode}`);
            setOrderNo('');
            setAmount('');
            loadWalletData();
            loadTransactionsData();
            loadOrdersData();
            setTab('wallet');
          } else {
            showToast(data.detail || "Submission failed", "error");
          }
        } catch (e) { showToast("Connection error", "error"); }
        finally { setOrderLoading(false); }
      };

      const handleRefundSubmit = async (e) => {
        e.preventDefault();
        if (!refOrderNo || !refAmount || !refReason) {
          showToast("Refund Order, Amount and Reason are required", "error");
          return;
        }
        setRefLoading(true);
        try {
          const res = await fetch('/api/refunds', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              orderNo: refOrderNo,
              reason: refReason,
              upi: refUpi,
              amount: parseFloat(refAmount)
            }),
          });
          if (res.ok) {
            showToast("Refund request logged for review");
            setRefOrderNo('');
            setRefReason('');
            setRefUpi('');
            setRefAmount('');
            setTab('wallet');
          } else {
            const err = await res.json();
            showToast(err.detail || "Submission failed", "error");
          }
        } catch (e) { showToast("Connection failed", "error"); }
        finally { setRefLoading(false); }
      };

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">
          
          {/* Header */}
          <header className="glass-panel sticky top-0 z-40 border-b border-slate-200/50 dark:border-slate-800/40 px-6 py-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-gradient-to-tr from-brand-600 to-indigo-600 rounded-xl flex items-center justify-center text-white font-extrabold shadow-sm">AG</div>
              <div>
                <h1 className="font-extrabold text-lg tracking-tight">deals.seller</h1>
                <p className="text-xs text-slate-400 font-semibold tracking-wider uppercase">Buyer Portal</p>
              </div>
            </div>

            <div className="flex items-center gap-4">
              <button onClick={toggleDarkMode} className="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-900 border border-slate-200/50 dark:border-slate-800/50">
                {darkMode ? <Icons.Sun /> : <Icons.Moon />}
              </button>

              <div className="flex items-center gap-3 border-l border-slate-200 dark:border-slate-800 pl-4">
                <div className="text-right">
                  <p className="text-sm font-bold text-slate-800 dark:text-slate-200">{user?.name}</p>
                  <p className="text-[10px] text-brand-600 font-bold uppercase">{user?.role}</p>
                </div>
                <button onClick={handleLogout} className="p-2.5 rounded-xl hover:bg-rose-50 dark:hover:bg-rose-950/20 text-rose-500 border border-slate-200/50 dark:border-slate-800/50">
                  <Icons.LogOut />
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            {/* Left 2 columns */}
            <div className="lg:col-span-2 space-y-8">
              
              {/* Wallet widgets */}
              <div className="glass-panel rounded-3xl p-6 border border-slate-200/50 dark:border-slate-800/40 shadow-sm">
                <h3 className="font-extrabold text-lg tracking-tight mb-6 flex items-center gap-2">
                  <Icons.Dollar />
                  <span>My Wallet Balance Ledger</span>
                </h3>

                <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                  <div className="bg-gradient-to-tr from-brand-600 to-indigo-600 text-white rounded-2xl p-5 shadow-sm">
                    <p className="text-[10px] uppercase font-bold tracking-wider opacity-75">Withdrawable</p>
                    <h4 className="text-3xl font-extrabold mt-2">₹{wallet?.withdrawableCashback?.toLocaleString() || '0.00'}</h4>
                    <p className="text-[9px] mt-4 opacity-75">Paid & verified cashback</p>
                  </div>

                  <div className="bg-white/80 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm">
                    <p className="text-[10px] uppercase font-bold tracking-wider text-slate-400">Pending</p>
                    <h4 className="text-3xl font-extrabold text-slate-800 dark:text-slate-100 mt-2">₹{wallet?.pendingCashback?.toLocaleString() || '0.00'}</h4>
                    <p className="text-[9px] text-slate-400 mt-4">Orders under review</p>
                  </div>

                  <div className="bg-white/80 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm">
                    <p className="text-[10px] uppercase font-bold tracking-wider text-slate-400">Refund Balance</p>
                    <h4 className="text-3xl font-extrabold text-slate-800 dark:text-slate-100 mt-2">₹{wallet?.refundBalance?.toLocaleString() || '0.00'}</h4>
                    <p className="text-[9px] text-slate-400 mt-4">Cleared refund amounts</p>
                  </div>
                </div>
              </div>

              {/* Transactions list */}
              <div className="glass-panel rounded-3xl p-6 border border-slate-200/50 dark:border-slate-800/40 shadow-sm">
                <h3 className="font-extrabold text-lg tracking-tight mb-6 flex items-center gap-2">
                  <Icons.FileText />
                  <span>Recent Transaction Log</span>
                </h3>

                <div className="space-y-4 max-h-[350px] overflow-y-auto">
                  {transactions.map(tx => (
                    <div key={tx.id} className="flex justify-between items-center p-4 bg-white/70 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl">
                      <div>
                        <p className="font-bold text-sm text-slate-800 dark:text-slate-200">{tx.description}</p>
                        <p className="text-[10px] text-slate-400 font-semibold mt-0.5">{tx.timestamp.replace('T', ' ')}</p>
                      </div>
                      <div className="text-right">
                        <p className={`font-extrabold text-sm ${tx.type === 'credit' ? 'text-emerald-500' : 'text-rose-500'}`}>
                          {tx.type === 'credit' ? '+' : '-'} ₹{tx.amount}
                        </p>
                        <span className="text-[8px] font-bold uppercase tracking-wider bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-full text-slate-500 inline-block mt-1">
                          {tx.category.replace('_', ' ')}
                        </span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Right column Form modules */}
            <div className="space-y-8">
              {/* Order Submit */}
              <div className="glass-panel rounded-3xl p-6 border border-slate-200/50 dark:border-slate-800/40 shadow-sm">
                <h3 className="font-extrabold text-base mb-4 tracking-tight flex items-center gap-2">
                  <Icons.ShoppingBag />
                  <span>Log Purchase Order</span>
                </h3>
                
                <form onSubmit={handleOrderSubmit} className="space-y-4">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Order No ID</label>
                    <input
                      type="text"
                      value={orderNo}
                      onChange={(e) => setOrderNo(e.target.value)}
                      placeholder="402-0025862-2109921"
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                    />
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Catalog Product</label>
                    <select
                      value={productCode}
                      onChange={(e) => setProductCode(e.target.value)}
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                    >
                      <option value="AMZ001">boAt Rockerz 255 Pro+ Wireless Earphones - ₹1,299</option>
                      <option value="AMZ002">Noise ColorFit Pro 4 Smartwatch - ₹2,499</option>
                      <option value="FLK001">Redmi 13C 4G Smartphone - ₹8,999</option>
                      <option value="BLK001">Amul Butter (500g) - ₹290</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Purchase price</label>
                    <input
                      type="number"
                      value={amount}
                      onChange={(e) => setAmount(e.target.value)}
                      placeholder="1299"
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                    />
                  </div>

                  <button type="submit" disabled={orderLoading} className="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-bold text-xs shadow-md">
                    {orderLoading ? 'Logging...' : 'Submit Claim'}
                  </button>
                </form>
              </div>

              {/* Refund Claim submit */}
              <div className="glass-panel rounded-3xl p-6 border border-slate-200/50 dark:border-slate-800/40 shadow-sm">
                <h3 className="font-extrabold text-base mb-4 tracking-tight flex items-center gap-2">
                  <Icons.Refresh />
                  <span>Request Cash Refund</span>
                </h3>

                <form onSubmit={handleRefundSubmit} className="space-y-4">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Order No</label>
                    <input
                      type="text"
                      value={refOrderNo}
                      onChange={(e) => setRefOrderNo(e.target.value)}
                      placeholder="402-0437892-3137934"
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                    />
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">UPI ID Address</label>
                    <input
                      type="text"
                      value={refUpi}
                      onChange={(e) => setRefUpi(e.target.value)}
                      placeholder="example@upi"
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                    />
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Refund Claim Amount</label>
                    <input
                      type="number"
                      value={refAmount}
                      onChange={(e) => setRefAmount(e.target.value)}
                      placeholder="e.g. 276"
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                    />
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Reason</label>
                    <input
                      type="text"
                      value={refReason}
                      onChange={(e) => setRefReason(e.target.value)}
                      placeholder="e.g. Cashback not credited"
                      className="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:outline-none dark:text-white"
                    />
                  </div>

                  <button type="submit" disabled={refLoading} className="w-full py-3 bg-rose-600 hover:bg-rose-700 text-white rounded-xl font-bold text-xs shadow-md">
                    {refLoading ? 'Submitting...' : 'Claim Refund'}
                  </button>
                </form>
              </div>
            </div>
          </main>
        </div>
      );
    }

    // Mount to root DOM node
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
