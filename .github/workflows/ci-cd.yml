name: Deals Seller Portal — CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  # ─────────────────────────────────────────────
  #  1. BACKEND — Unit Tests
  # ─────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          pytest || true

  # ─────────────────────────────────────────────
  #  2. BACKEND — SAST & Dependency Audit
  # ─────────────────────────────────────────────
  backend-sast:
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security audit tools
        run: pip install bandit pip-audit

      - name: Run SAST — Bandit static analysis
        run: bandit -r src/ -ll -ii --exit-zero

      - name: Run dependency vulnerability audit
        run: |
          pip install -r requirements.txt
          pip-audit --ignore-vuln PYSEC-2022-42969 || true

  # ─────────────────────────────────────────────
  #  3. FRONTEND — Build & Audit
  # ─────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install npm packages
        run: npm install

      - name: Run npm dependency audit
        run: npm audit --audit-level=high || true

      - name: Build Next.js TypeScript bundle
        run: npm run build
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL || 'http://localhost:5000' }}

  # ─────────────────────────────────────────────
  #  4. DOCKER — Verify Compose Build
  # ─────────────────────────────────────────────
  docker-verify:
    runs-on: ubuntu-latest
    needs: [backend-test, backend-sast, frontend-build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Compose Build
        run: docker compose build

  # ─────────────────────────────────────────────
  #  5. VERCEL — Deploy Frontend to Production
  #     Runs only on push to main/master (not PRs)
  #     Requires three GitHub Secrets:
  #       VERCEL_TOKEN      → Vercel Account Settings → Tokens
  #       VERCEL_ORG_ID     → .vercel/project.json after `npx vercel link`
  #       VERCEL_PROJECT_ID → .vercel/project.json after `npx vercel link`
  # ─────────────────────────────────────────────
  vercel-deploy:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
