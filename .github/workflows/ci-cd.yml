name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest calculations & wallet tests
        run: |
          pytest

  backend-sast:
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security audit tools
        run: |
          pip install bandit pip-audit

      - name: Run SAST — Bandit static analysis
        run: |
          bandit -r src/ -ll -ii --exit-zero

      - name: Run dependency vulnerability audit
        run: |
          pip install -r requirements.txt
          pip-audit --ignore-vuln PYSEC-2022-42969 || true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm packages
        run: npm ci || npm install

      - name: Run npm dependency audit
        run: npm audit --audit-level=high || true

      - name: Build Next.js TypeScript bundle
        run: npm run build

  docker-verify:
    runs-on: ubuntu-latest
    needs: [backend-test, backend-sast, frontend-build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Dry-run Docker Compose Build
        run: |
          docker compose build
