<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order — deals.seller</title>
  <meta name="description" content="Track the status of your cashback deal order with deals.seller.">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeInMsg { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .step-active { background: #5c6bc0 !important; color: white !important; }
    .step-done   { background: #22c55e !important; color: white !important; }
    .step-line-done { background: #22c55e !important; }
  </style>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;">

  <!-- Header -->
  <header class="sticky-header" id="track-page-header">
    <a href="index.html" class="brand">
      <i class="ph-fill ph-storefront" style="margin-right:6px;"></i> deals.seller
    </a>
    <nav class="nav-pills">
      <a href="deals.html" class="glass-pill" id="track-deals-link">Live Deals</a>
      <a href="login.html" class="glass-pill" id="track-login-link" style="background:#5c6bc0;color:white;border-color:#5c6bc0;">Login</a>
    </nav>
  </header>

  <!-- Hero -->
  <main style="flex:1;padding:40px 16px 60px;display:flex;flex-direction:column;align-items:center;">
    <div style="max-width:520px;width:100%;">

      <!-- Icon + Title -->
      <div style="text-align:center;margin-bottom:36px;">
        <div style="width:80px;height:80px;background:linear-gradient(135deg,#5c6bc0,#7c3aed);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 25px rgba(92,107,192,0.35);animation:float 3s ease-in-out infinite;">
          <i class="ph-bold ph-package" style="font-size:2.2rem;color:white;"></i>
        </div>
        <h1 style="font-size:1.7rem;font-weight:700;color:#1e1b4b;margin-bottom:6px;">Track Your Order</h1>
        <p style="color:#6b7280;font-weight:600;font-size:0.9rem;">Enter your Order ID to get real-time status updates</p>
      </div>

      <!-- Search Card -->
      <div class="form-card" style="margin-bottom:20px;" id="track-search-card">
        <label class="form-label" for="order-id-input">Order ID <span style="color:#ef4444;">*</span></label>
        <div style="display:flex;gap:10px;margin-bottom:12px;">
          <input type="text" class="form-input" id="order-id-input" placeholder="e.g. 408-1234567-8901234 or TXN123" style="flex:1;margin-bottom:0;">
          <button class="search-btn" onclick="handleTrack()" id="track-btn" style="white-space:nowrap;">
            <i class="ph-bold ph-magnifying-glass"></i> Track
          </button>
        </div>
        <div class="info-box">
          💡 Use the same Order ID you submitted in the Order Form.
        </div>
      </div>

      <!-- Result Area -->
      <div id="track-result"></div>

      <!-- System Status -->
      <div style="margin-top:32px;background:white;border-radius:16px;padding:16px;box-shadow:0 4px 15px rgba(0,0,0,0.05);" id="system-status-card">
        <div style="font-weight:700;color:#374151;font-size:0.88rem;margin-bottom:12px;display:flex;align-items:center;gap:6px;">
          <i class="ph-bold ph-activity" style="color:#5c6bc0;"></i> System Status
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:0.83rem;font-weight:600;color:#4b5563;">Order Processing</span>
            <span class="status-online" style="font-size:0.72rem;"><span class="status-dot"></span> Operational</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:0.83rem;font-weight:600;color:#4b5563;">Cashback Credits</span>
            <span class="status-online" style="font-size:0.72rem;"><span class="status-dot"></span> Operational</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:0.83rem;font-weight:600;color:#4b5563;">Refund Processing</span>
            <span class="status-online" style="font-size:0.72rem;"><span class="status-dot"></span> Operational</span>
          </div>
        </div>
        <div style="margin-top:10px;font-size:0.75rem;color:#9ca3af;font-weight:600;text-align:center;">Last updated: Just now</div>
      </div>

    </div>
  </main>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>

  <script src="js/main.js"></script>
  <script>
    function handleTrack() {
      const input = document.getElementById('order-id-input');
      const resultArea = document.getElementById('track-result');
      const orderId = input.value.trim();
      if (!orderId) {
        resultArea.innerHTML = '<div class="form-card" style="text-align:center;color:#dc2626;"><i class="ph-fill ph-warning" style="font-size:1.5rem;display:block;margin-bottom:6px;"></i><strong>Please enter a valid Order ID.</strong></div>';
        return;
      }
      const btn = document.getElementById('track-btn');
      btn.innerHTML = '<i class="ph-bold ph-spinner" style="animation:spin 1s linear infinite;"></i>';
      btn.disabled = true;
      resultArea.innerHTML = '';

      setTimeout(() => {
        btn.innerHTML = '<i class="ph-bold ph-magnifying-glass"></i> Track';
        btn.disabled = false;

        const steps = [
          { label: 'Order Placed', icon: 'ph-file-plus', done: true },
          { label: 'Under Review', icon: 'ph-magnifying-glass', done: true },
          { label: 'Verified', icon: 'ph-check-circle', done: true },
          { label: 'Cashback Processing', icon: 'ph-arrow-counter-clockwise', done: false },
          { label: 'Cashback Credited', icon: 'ph-wallet', done: false },
        ];

        const stepsHTML = steps.map((step, i) => `
          <div style="display:flex;flex-direction:column;align-items:center;flex:1;">
            <div style="width:36px;height:36px;border-radius:50%;background:${step.done ? '#22c55e' : (i === 3 ? '#5c6bc0' : '#e5e7eb')};display:flex;align-items:center;justify-content:center;color:${step.done || i === 3 ? 'white' : '#9ca3af'};font-size:1rem;transition:all 0.3s;box-shadow:${step.done ? '0 4px 10px rgba(34,197,94,0.3)' : (i === 3 ? '0 4px 10px rgba(92,107,192,0.3)' : 'none')};">
              <i class="ph-bold ${step.icon}"></i>
            </div>
            <div style="font-size:0.7rem;font-weight:700;color:${step.done ? '#15803d' : (i === 3 ? '#5c6bc0' : '#9ca3af')};margin-top:6px;text-align:center;max-width:60px;line-height:1.3;">${step.label}</div>
            ${i < steps.length - 1 ? `<div style="position:absolute;"></div>` : ''}
          </div>
        `).join('');

        const linesHTML = steps.slice(0, -1).map((step, i) => `
          <div style="flex:1;height:3px;background:${step.done ? '#22c55e' : '#e5e7eb'};border-radius:2px;margin:0 4px;margin-top:-40px;"></div>
        `).join('');

        resultArea.innerHTML = `
          <div class="form-card" style="animation:fadeInMsg 0.4s ease;" id="track-result-card">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1.5px solid #f3f4f6;">
              <div style="width:44px;height:44px;background:linear-gradient(135deg,#dbeafe,#eff6ff);border-radius:50%;display:flex;align-items:center;justify-content:center;">
                <i class="ph-fill ph-package" style="font-size:1.3rem;color:#5c6bc0;"></i>
              </div>
              <div>
                <div style="font-weight:700;color:#1f2937;font-size:1rem;">Order #${orderId}</div>
                <div style="font-size:0.8rem;color:#6b7280;font-weight:600;">Submitted: Today</div>
              </div>
              <div style="margin-left:auto;">
                <span style="background:#dbeafe;color:#1d4ed8;padding:4px 12px;border-radius:99px;font-size:0.78rem;font-weight:700;">Processing</span>
              </div>
            </div>

            <!-- Progress Steps -->
            <div style="position:relative;margin-bottom:24px;">
              <div style="display:flex;align-items:flex-start;position:relative;">
                ${stepsHTML}
              </div>
            </div>

            <!-- Details -->
            <div style="background:#f9fafb;border-radius:12px;padding:14px;">
              <div style="font-weight:700;color:#374151;font-size:0.85rem;margin-bottom:10px;">Order Details</div>
              <div style="display:flex;flex-direction:column;gap:8px;">
                <div style="display:flex;justify-content:space-between;font-size:0.83rem;">
                  <span style="color:#6b7280;font-weight:600;">Status</span>
                  <span style="color:#5c6bc0;font-weight:700;">Cashback Processing</span>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:0.83rem;">
                  <span style="color:#6b7280;font-weight:600;">Expected Cashback</span>
                  <span style="color:#15803d;font-weight:700;">Within 24–48 hours</span>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:0.83rem;">
                  <span style="color:#6b7280;font-weight:600;">Mode</span>
                  <span style="color:#374151;font-weight:700;">Demo</span>
                </div>
              </div>
            </div>

            <div style="margin-top:14px;text-align:center;">
              <a href="login.html" style="font-size:0.85rem;color:#7c3aed;font-weight:700;text-decoration:none;" id="view-dashboard-link">View in Dashboard →</a>
            </div>
          </div>
        `;
      }, 1800);
    }
  </script>
</body>
</html>
